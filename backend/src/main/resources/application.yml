spring:
  application:
    name: validation-rule-manager

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/associate_software?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:9952}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          salesforce:
            client-id: ${SF_CLIENT_ID}
            client-secret: ${SF_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: ${SF_REDIRECT_URI:http://localhost:8080/api/auth/callback}
            scope:
              - api
              - refresh_token
              - full
            client-name: Salesforce
        provider:
          salesforce:
            authorization-uri: ${SF_INSTANCE_URL:https://login.salesforce.com}/services/oauth2/authorize
            token-uri: ${SF_INSTANCE_URL:https://login.salesforce.com}/services/oauth2/token
            user-info-uri: ${SF_INSTANCE_URL:https://login.salesforce.com}/services/oauth2/userinfo
            user-name-attribute: sub

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30m
      cookie:
        same-site: none
        secure: true
        http-only: true

salesforce:
  instance-url: ${SF_INSTANCE_URL:https://login.salesforce.com}
  api-version: "59.0"

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    root: INFO
    com.AssociateSoftwareEngineer: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"